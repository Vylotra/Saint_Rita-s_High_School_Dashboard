<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <style>
        body { font-family: 'Poppins', sans-serif; background: #edf2f7; padding: 40px; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .box { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <h1>Admin Control Center</h1>
    <div class="grid">
        <div class="box"><h3>Total Users</h3><p style="font-size: 2rem;">500+</p></div>
        <div class="box"><h3>Active Classes</h3><p style="font-size: 2rem;">25</p></div>
        <div class="box"><h3>System Health</h3><p style="font-size: 2rem;">100%</p></div>
    </div>
</body>
</html>
