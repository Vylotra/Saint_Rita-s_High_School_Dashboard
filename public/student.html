<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Dashboard</title>
    <style>
        body { background: linear-gradient(135deg, #74ebd5 0%, #9face6 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { background: rgba(255,255,255,0.9); padding: 50px; border-radius: 30px; backdrop-filter: blur(10px); width: 400px; text-align: center; }
        .progress { background: #eee; height: 15px; border-radius: 10px; margin: 20px 0; }
        .bar { background: #6c5ce7; height: 100%; width: 60%; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Welcome, Student!</h1>
        <p>Keep up the great work!</p>
        <div class="progress"><div class="bar"></div></div>
        <button style="padding: 10px 20px; background: #6c5ce7; color: white; border: none; border-radius: 10px;">Start Class</button>
    </div>
</body>
</html>
