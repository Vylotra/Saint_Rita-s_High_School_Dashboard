<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Teacher Dashboard</title>
    <style>
        body { margin: 0; font-family: 'Poppins', sans-serif; background: #f4f7f6; display: flex; }
        .sidebar { width: 250px; background: #2c3e50; color: white; height: 100vh; padding: 20px; }
        .content { flex: 1; padding: 40px; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 15px; border-bottom: 1px solid #ddd; text-align: left; }
    </style>
</head>
<body>
    <div class="sidebar"><h2>Teacher Panel</h2></div>
    <div class="content">
        <div class="card">
            <h1>My Class Students</h1>
            <table>
                <thead><tr><th>Name</th><th>Email</th><th>Status</th></tr></thead>
                <tbody id="studentList"></tbody>
            </table>
        </div>
    </div>
</body>
</html>
