<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Registration - Saint Rita's High School</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f4; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { display: flex; width: 900px; background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .left-panel { background-color: #2c4a6b; color: white; padding: 40px; width: 35%; display: flex; flex-direction: column; justify-content: center; }
        .right-panel { padding: 40px; width: 65%; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        
        .show-pass-container { display: flex; align-items: center; font-size: 13px; color: #555; margin-bottom: 15px; cursor: pointer; }
        .show-pass-container input { width: auto; margin-right: 8px; }
        
        button { width: 100%; padding: 12px; background: #2c4a6b; color: white; border: none; border-radius: 8px; cursor: pointer; margin-top: 15px; font-size: 16px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="left-panel" id="leftPanel">
        <h1 id="panelTitle">Student Registration</h1>
        <p id="panelSubtitle">Join Saint Rita's High School community.</p>
    </div>
    <div class="right-panel">
        <form id="regForm">
            <input type="text" id="name" placeholder="Full Name" required>
            <input type="email" id="email" placeholder="Email" required>
            <input type="password" id="password" placeholder="Password" required>
            
            <label class="show-pass-container">
                <input type="checkbox" onclick="togglePassword()"> Show Password
            </label>
            
            <select id="role" onchange="toggleFields()">
                <option value="student">Student</option>
                <option value="teacher">Teacher</option>
                <option value="admin">Admin</option>
            </select>

            <!-- Student Fields -->
            <div id="studentFields">
                <select id="class" onchange="updateOptions()">
                    <option value="">Select Class</option>
                    <option value="5">Class 5</option><option value="6">Class 6</option>
                    <option value="7">Class 7</option><option value="8">Class 8</option>
                    <option value="9">Class 9</option><option value="10">Class 10</option>
                </select>
                <select id="groupSection"></select>
                <input type="text" id="roll" placeholder="Roll Number">
                <input type="text" id="teacherName" placeholder="Mentor Teacher Name">
            </div>

            <!-- Teacher Fields -->
            <div id="teacherFields" class="hidden">
                <input type="text" id="subject" placeholder="Teaching Subject">
            </div>

            <!-- Admin Fields -->
            <div id="adminFields" class="hidden">
                <p>Admin Access Granted</p>
            </div>

            <button type="submit">Register</button>
        </form>
    </div>
</div>

<script>
    function togglePassword() {
        const pass = document.getElementById('password');
        pass.type = (pass.type === "password") ? "text" : "password";
    }

    function toggleFields() {
        const role = document.getElementById('role').value;
        const title = document.getElementById('panelTitle');
        const subtitle = document.getElementById('panelSubtitle');

        document.getElementById('studentFields').style.display = (role === 'student') ? 'block' : 'none';
        document.getElementById('teacherFields').style.display = (role === 'teacher') ? 'block' : 'none';
        document.getElementById('adminFields').style.display = (role === 'admin') ? 'block' : 'none';

        if(role === 'student') { 
            title.innerText = "Student Registration"; 
            subtitle.innerText = "Join Saint Rita's High School community."; 
        } else if(role === 'teacher') { 
            title.innerText = "Teacher Portal"; 
            subtitle.innerText = "Welcome to the faculty management system."; 
        } else { 
            title.innerText = "Admin Access"; 
            subtitle.innerText = "Manage school operations and data."; 
        }
    }

    function updateOptions() {
        const cls = document.getElementById('class').value;
        const gs = document.getElementById('groupSection');
        gs.innerHTML = '<option value="">Select Group/Section</option>';
        let options = (cls >= 9) ? ["Science", "Arts", "Commerce"] : ["Section A", "Section B", "Section C"];
        if(cls) { 
            options.forEach(opt => { 
                let el = document.createElement("option"); 
                el.textContent = opt; 
                el.value = opt; 
                gs.appendChild(el); 
            }); 
        }
    }

    document.getElementById('regForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        // এখানে তোমার সার্ভারের ডাটা পাঠানোর কোড থাকবে
        alert("Registration Request Sent Successfully!");
        
        // সফল হওয়ার পর লগইন পেজে রিডাইরেক্ট
        window.location.href = 'login.html'; 
    });
</script>

</body>
</html>
